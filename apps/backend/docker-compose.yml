services:
  db:
    image: pgvector/pgvector:pg16
    container_name: paa-db
    environment:
      POSTGRES_USER: paa
      POSTGRES_PASSWORD: paa
      POSTGRES_DB: paa
    ports:
      - "5432:5432"
    volumes:
      - paa_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paa -d paa"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  paa_pgdata:
