name: Pre-commit

on:
  pull_request:
    branches: [main, dev, test]
  push:
    branches: [main, dev, test]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install uv
      uses: astral-sh/setup-uv@v4
    - name: Install dependencies
      run: uv sync --all-groups
    - uses: pre-commit/action@v3.0.1
