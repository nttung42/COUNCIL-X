services:
  postgres:
    image: postgres:15-alpine
    container_name: shb-postgres
    environment:
      POSTGRES_USER: shb
      POSTGRES_PASSWORD: shb-password
      POSTGRES_DB: shb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shb-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: api
    container_name: shb-app
    environment:
      DATABASE_URL: postgresql+asyncpg://shb:shb-password@postgres:5432/shb
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      LOG_LEVEL: INFO
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_PROVIDER: openai
      WHISPER_PROVIDER: openai
    ports:
      - "8888:8000"
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn shb.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: .
      target: api
    container_name: shb-celery-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://shb:shb-password@postgres:5432/shb
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      LOG_LEVEL: INFO
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_PROVIDER: openai
      WHISPER_PROVIDER: openai
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A shb.core.celery_app worker --loglevel=info

volumes:
  postgres_data:
  redis_data:
